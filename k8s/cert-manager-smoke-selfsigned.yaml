apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: smoke-selfsigned-issuer
  namespace: certman-lab
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: smoke-cert-selfsigned
  namespace: certman-lab
spec:
  secretName: smoke-cert-selfsigned-tls
  commonName: smoke.certman.local
  dnsNames:
    - smoke.certman.local
  duration: 24h
  renewBefore: 8h
  issuerRef:
    kind: Issuer
    name: smoke-selfsigned-issuer
