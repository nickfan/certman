# CertMan 生产级凭据注入示例
#
# 设计原则
# ─────────────────────────────────────────────────────────────────────────────
# 1. 非敏感配置（config.toml / item_*.toml）→ ConfigMap → 挂载到 /data/conf/
# 2. DNS provider 密钥（AK/SK / API Token）→ Secret → envFrom 注入环境变量
# 3. Node 注册令牌                          → Secret → secretKeyRef 单键注入
#
# CertMan 代码与 "本地 data/conf/.env" 模式完全兼容：
#   config.py : load_dotenv(override=False) → K8s env 优先级更高，.env 自动跳过
#   providers.py : os.getenv("CERTMAN_<PROVIDER>_<ACCOUNT>_<KEY>") → 来源透明
#
# 环境变量命名规则（来自 providers.py + normalize_account_id）
#   account_id "my_aliyun"    → CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_ID
#                                CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_SECRET
#   account_id "my_cloudflare"→ CERTMAN_CLOUDFLARE_MY_CLOUDFLARE_API_TOKEN
#   account_id "my_aws"       → CERTMAN_AWS_MY_AWS_ACCESS_KEY_ID
#                                CERTMAN_AWS_MY_AWS_SECRET_ACCESS_KEY
#                                CERTMAN_AWS_MY_AWS_REGION
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ConfigMap：非敏感配置文件 ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: certman-config
  namespace: certman-lab
data:
  # 全局配置 + 条目定义（item_*.toml 也可以放这里，或单独挂 subPath）
  # 凭据本身不写在这里；用 account_id 约定，值从环境变量里取
  config.toml: |
    [global]
    data_dir = "/data"
    conf_dir = "conf"
    run_dir  = "run"
    log_dir  = "log"
    output_dir  = "output"
    letsencrypt_dir = "letsencrypt"
    acme_server = "production"
    email       = "ops@example.com"
    scan_items_glob = "item_*.toml"

    [server]
    db_path = "data/run/certman.db"
    listen_host = "0.0.0.0"
    listen_port = 8000
    signing_key_path = "data/run/keys/server_ed25519.pem"

  item_example_aliyun.toml: |
    [[entries]]
    name        = "example-wildcard"
    description = "example.com wildcard cert (Aliyun DNS)"
    primary_domain    = "example.com"
    secondary_domains = ["*.example.com"]
    wildcard     = true
    dns_provider = "aliyun"
    # normalize_account_id("my_aliyun") = "MY_ALIYUN"
    # → 运行时读取 CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_ID / _SECRET
    account_id   = "my_aliyun"

  item_example_cloudflare.toml: |
    [[entries]]
    name        = "cf-wildcard"
    description = "cf-example.com wildcard cert (Cloudflare DNS)"
    primary_domain    = "cf-example.com"
    secondary_domains = ["*.cf-example.com"]
    wildcard     = true
    dns_provider = "cloudflare"
    # → 运行时读取 CERTMAN_CLOUDFLARE_MY_CF_API_TOKEN
    account_id   = "my_cf"

---
# ── 2. Secret：DNS provider 凭据（All-in-one，按需拆分多个 Secret）──────────
# 创建方式（从本地 .env 迁移，避免明文提交 Git）：
#   kubectl create secret generic certman-dns-credentials \
#     --from-literal=CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_ID=<AK> \
#     --from-literal=CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_SECRET=<SK> \
#     --from-literal=CERTMAN_CLOUDFLARE_MY_CF_API_TOKEN=<TOKEN> \
#     -n certman-lab
#
# 下面 stringData 仅作占位说明，**不要提交真实密钥到 Git**：
apiVersion: v1
kind: Secret
metadata:
  name: certman-dns-credentials
  namespace: certman-lab
type: Opaque
stringData:
  # Aliyun DNS（account_id = "my_aliyun"）
  CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_ID:     "REPLACE_WITH_REAL_AK"
  CERTMAN_ALIYUN_MY_ALIYUN_ACCESS_KEY_SECRET: "REPLACE_WITH_REAL_SK"
  # Cloudflare DNS（account_id = "my_cf"）
  CERTMAN_CLOUDFLARE_MY_CF_API_TOKEN:         "REPLACE_WITH_REAL_TOKEN"
  # AWS Route53（account_id = "my_aws"，可选）
  # CERTMAN_AWS_MY_AWS_ACCESS_KEY_ID:           "REPLACE_WITH_REAL_AK"
  # CERTMAN_AWS_MY_AWS_SECRET_ACCESS_KEY:       "REPLACE_WITH_REAL_SK"
  # CERTMAN_AWS_MY_AWS_REGION:                  "us-east-1"

---
# ── 3. Secret：Node Agent 注册令牌（单键，独立 Secret）──────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: certman-agent-registration
  namespace: certman-lab
type: Opaque
stringData:
  registration-token: "REPLACE_WITH_REAL_TOKEN"

---
# ── 4. Deployment：certman-server（envFrom 注入凭据）────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-server
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-server
  template:
    metadata:
      labels:
        app: certman-server
    spec:
      containers:
      - name: server
        image: certman:latest
        command: ["uv", "run", "certman-server", "--data-dir", "/data", "--config-file", "config.toml"]
        ports:
        - containerPort: 8000
          name: http
        # ── 环境变量：固定值 ──
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        # ── 环境变量：从 Secret 批量注入（envFrom）──
        # Secret 里的每个 key → 同名环境变量，与本地 .env 完全兼容
        envFrom:
        - secretRef:
            name: certman-dns-credentials
        # ── 挂载：PV（运行时数据）+ ConfigMap（配置文件）──
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf     # ConfigMap 覆盖整个 conf 目录
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config

---
# ── 5. Deployment：certman-worker（与 server 相同的凭据注入模式）────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-worker
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-worker
  template:
    metadata:
      labels:
        app: certman-worker
    spec:
      containers:
      - name: worker
        image: certman:latest
        command: ["uv", "run", "certman-worker", "--data-dir", "/data", "--config-file", "config.toml", "--loop", "--interval-seconds", "60"]
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        envFrom:
        - secretRef:
            name: certman-dns-credentials   # 同一 Secret，worker 执行实际 certbot
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config

---
# ── 6. Deployment：certman-agent（单键 secretKeyRef 注入注册令牌）────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-agent
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-agent
  template:
    metadata:
      labels:
        app: certman-agent
    spec:
      containers:
      - name: agent
        image: certman:latest
        command: ["uv", "run", "certman-agent", "--data-dir", "/data", "--config-file", "config-agent.toml", "--loop"]
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        # agent 不做 DNS 签发，只注入注册令牌
        - name: CERTMAN_NODE_REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: certman-agent-registration
              key: registration-token
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config
