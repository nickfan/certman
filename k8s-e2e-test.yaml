---
apiVersion: v1
kind: Namespace
metadata:
  name: certman-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: certman-config
  namespace: certman-lab
data:
  config.toml: |
    [global]
    data_dir = "/data"
    conf_dir = "conf"
    run_dir = "run"
    log_dir = "log"
    output_dir = "output"
    letsencrypt_dir = "letsencrypt"
    acme_server = "staging"
    email = "admin@example.com"
    scan_items_glob = "item_*.toml"
    
    [server]
    db_path = "data/run/certman.db"
    listen_host = "0.0.0.0"
    listen_port = 8000
    signing_key_path = "data/run/keys/server_ed25519.pem"

    [scheduler]
    enabled = true
    mode = "loop"
    scan_interval_seconds = 30
    renew_before_days = 30
    
    [[entries]]
    name = "site-a"
    description = "Test site A"
    primary_domain = "site-a.example.com"
    secondary_domains = ["www.site-a.example.com"]
    wildcard = true
    dns_provider = "cloudflare"
    account_id = "test_cloudflare"
    
    [[hooks]]
    name = "reload_nginx"
    event = "certificate.renewed"
    command = "echo 'reloaded nginx after cert renewal'"
    shell = true
  config-agent.toml: |
    run_mode = "agent"

    [global]
    data_dir = "/data"
    conf_dir = "conf"
    run_dir = "run"
    log_dir = "log"
    output_dir = "output"

    [control_plane]
    endpoint = "http://certman-server:8000"
    poll_interval_seconds = 15

    [node_identity]
    node_id = "node-a"
    private_key_path = "run/keys/node-a.pem"
    public_key_path = "run/keys/node-a.pub.pem"
    certificate_store_path = "output/node-a"
---
apiVersion: v1
kind: Secret
metadata:
  name: certman-agent-registration
  namespace: certman-lab
type: Opaque
stringData:
  registration-token: replace-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: certman-data
  namespace: certman-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-server
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-server
  template:
    metadata:
      labels:
        app: certman-server
    spec:
      containers:
      - name: server
        image: certman:local
        imagePullPolicy: Never
        command: ["uv", "run", "certman-server", "--data-dir", "/data", "--config-file", "config.toml"]
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config
---
apiVersion: v1
kind: Service
metadata:
  name: certman-server
  namespace: certman-lab
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: certman-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-worker
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-worker
  template:
    metadata:
      labels:
        app: certman-worker
    spec:
      containers:
      - name: worker
        image: certman:local
        imagePullPolicy: Never
        command: ["uv", "run", "certman-worker", "--data-dir", "/data", "--config-file", "config.toml", "--loop", "--interval-seconds", "10"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-scheduler
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-scheduler
  template:
    metadata:
      labels:
        app: certman-scheduler
    spec:
      containers:
      - name: scheduler
        image: certman:local
        imagePullPolicy: Never
        command: ["uv", "run", "certman-scheduler", "run", "--data-dir", "/data", "--config-file", "config.toml", "--loop"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certman-agent
  namespace: certman-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certman-agent
  template:
    metadata:
      labels:
        app: certman-agent
    spec:
      containers:
      - name: agent
        image: certman:local
        imagePullPolicy: Never
        command: ["uv", "run", "certman-agent", "--data-dir", "/data", "--config-file", "config-agent.toml", "--once"]
        env:
        - name: CERTMAN_NODE_REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: certman-agent-registration
              key: registration-token
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /data/conf
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: certman-data
      - name: config
        configMap:
          name: certman-config
